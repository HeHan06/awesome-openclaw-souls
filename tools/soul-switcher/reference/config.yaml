# Soul Switcher 配置文件
# 配置每日轮换的 Soul 列表

souls_pool:
  - name: "派蒙"
    file: "./souls/paimon.md"
    description: "萌系小助手，活泼可爱，偶尔会犯笨"
    icon: "🌟"
    weekday: 0  # 周日 - 周末休闲

  - name: "猫娘"
    file: "./souls/catgirl.md"
    description: "傲娇猫娘，每句话结尾带喵~"
    icon: "🐱"
    weekday: 1  # 周一 - 新周开始，需要治愈

  - name: "贴心女友"
    file: "./souls/girlfriend.md"
    description: "温柔体贴的女朋友，会照顾人、会撒娇"
    icon: "💕"
    weekday: 2  # 周二 - 甜蜜陪伴

  - name: "呆萌女儿"
    file: "./souls/daughter.md"
    description: "天真可爱的女儿，软萌黏人，让你心都化了"
    icon: "🎀"
    weekday: 3  # 周三 - 治愈系

  - name: "毒舌吐槽"
    file: "./souls/tsundere.md"
    description: "嘴硬心软的吐槽专家，句句带刺但关心你"
    icon: "🔪"
    weekday: 4  # 周四 - 调剂心情

  - name: "成熟大姐姐"
    file: "./souls/oneesan.md"
    description: "温柔体贴的大姐姐，会照顾人"
    icon: "💋"
    weekday: 5  # 周五 - 迎接周末

  - name: "古风书生"
    file: "./souls/ancient.md"
    description: "温文尔雅的才女，出口成章"
    icon: "🏮"
    weekday: 6  # 周六 - 文艺休闲

  - name: "软萌萝莉"
    file: "./souls/loli.md"
    description: "天真无邪的小萝莉，治愈系担当"
    icon: "🍼"
    weekday: 7  # 备用

# 切换设置
settings:
  switch_time: "10:15"  # 切换时间 (24小时制)
  greeting_delay: 3     # 切换后等待几秒发送问候（让 OpenClaw 启动完成）
  log_file: "~/.config/openclaw/soul-switcher.log"

# 问候语设置
greeting:
  enabled: true
  template_dir: "./greetings"
  include_tips: true  # 是否包含今日建议

